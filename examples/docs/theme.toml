[theme]
name = "webcore-docs"

[theme.colors]
primary    = "#EA580C"
secondary  = "#16A34A"
background = "#F8FAFC"
surface    = "#FFFFFF"
border     = "#E2E8F0"
text       = "#0F172A"
muted      = "#64748B"
accent     = "#2563EB"
danger     = "#DC2626"
code-bg    = "#0F172A"

[theme.fonts]
mono = "ui-monospace, SFMono-Regular, 'Fira Code', monospace"
sans = "Inter, system-ui, sans-serif"

[theme.spacing]
xs  = "0.35rem"
sm  = "0.6rem"
md  = "1rem"
lg  = "1.6rem"
xl  = "2.5rem"
xxl = "5rem"

[theme.radius]
sm = "6px"
md = "10px"
lg = "16px"
