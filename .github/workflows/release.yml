name: Release

# Builds the `webc` binary for Linux, macOS (Intel + Apple Silicon) and
# Windows whenever a version tag (e.g. `2.7.0`) is pushed, and attaches the
# archives to a GitHub release. Can also be run manually (workflow_dispatch)
# to test the packaging without publishing.

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    defaults:
      run:
        working-directory: webcore-compiler
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: webcore-compiler
          key: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p ../dist-pkg
          cp target/${{ matrix.target }}/release/webcore-compiler ../dist-pkg/webc
          cp ../LICENSE ../README.md ../dist-pkg/
          tar -czf ../webc-${{ matrix.target }}.tar.gz -C ../dist-pkg webc LICENSE README.md

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ../dist-pkg | Out-Null
          Copy-Item target/${{ matrix.target }}/release/webcore-compiler.exe ../dist-pkg/webc.exe
          Copy-Item ../LICENSE,../README.md ../dist-pkg/
          Compress-Archive -Path ../dist-pkg/webc.exe,../dist-pkg/LICENSE,../dist-pkg/README.md -DestinationPath ../webc-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: webc-${{ matrix.target }}
          path: |
            webc-${{ matrix.target }}.tar.gz
            webc-${{ matrix.target }}.zip
          if-no-files-found: error

  vsix:
    name: package VS Code extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package .vsix
        working-directory: editors/vscode
        run: npx -y @vscode/vsce@latest package --out webcore-language.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: webcore-language-vsix
          path: editors/vscode/webcore-language.vsix
          if-no-files-found: error

  release:
    name: publish release
    needs: [build, vsix]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release with assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          # Immutable releases reject asset uploads once a release is published.
          # Create the release as a *draft* (still mutable), attach every
          # artifact, then flip it to published — the canonical safe flow.
          if gh release view "$TAG" --json isDraft -q .isDraft 2>/dev/null | grep -q true; then
            # Leftover draft from a previous failed run: reuse and refresh assets.
            gh release upload "$TAG" artifacts/* --clobber
          elif gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::A published release for $TAG already exists. Immutable" \
                 "releases can't receive new assets — delete that release and re-run."
            exit 1
          else
            gh release create "$TAG" artifacts/* \
              --title "$TAG" \
              --generate-notes \
              --draft
          fi
          gh release edit "$TAG" --draft=false
